<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relay Command Panel</title>
    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 24px;
            background: linear-gradient(160deg, #eef7ff 0%, #f4fff2 100%);
            color: #1e293b;
        }
        h1 {
            margin: 0 0 16px;
            font-size: 28px;
        }
        .panel {
            max-width: 980px;
            margin: 0 auto;
            background: #ffffff;
            border: 1px solid #dbe5ee;
            border-radius: 16px;
            box-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
            overflow: hidden;
        }
        .header {
            padding: 18px 20px;
            background: #f8fbff;
            border-bottom: 1px solid #e5edf5;
        }
        .sub {
            margin: 6px 0 0;
            font-size: 14px;
            color: #4b5563;
        }
        .relay-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            padding: 16px;
        }
        .relay-row {
            display: grid;
            grid-template-columns: minmax(180px, 1fr) auto auto;
            gap: 10px;
            align-items: center;
            padding: 12px;
            background: #fbfdff;
            border: 1px solid #e3edf7;
            border-radius: 12px;
        }
        .relay-name {
            font-weight: 600;
            font-size: 15px;
            color: #0f172a;
        }
        button {
            min-width: 130px;
            padding: 10px 14px;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            border: 0;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.12s ease, filter 0.12s ease;
        }
        button:active {
            transform: translateY(1px);
        }
        .btn-on {
            background: #16a34a;
        }
        .btn-on:hover {
            filter: brightness(0.94);
        }
        .btn-off {
            background: #dc2626;
        }
        .btn-off:hover {
            filter: brightness(0.94);
        }
        .status {
            max-width: 980px;
            margin: 12px auto 0;
            font-size: 14px;
            color: #334155;
        }
        .status.error {
            color: #b91c1c;
        }
        .status.ok {
            color: #166534;
        }
        @media (max-width: 760px) {
            .relay-row {
                grid-template-columns: 1fr 1fr;
            }
            .relay-name {
                grid-column: 1 / -1;
            }
            button {
                min-width: 0;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="panel">
        <div class="header">
            <h1>Relay Command Panel</h1>
            <p class="sub">Her röle için ON ve OFF komutu yazılır.</p>
        </div>
        <div id="relay-grid" class="relay-grid"></div>
    </div>
    <div id="status" class="status">Hazır</div>

    <script>
        const firebaseUrl = "https://send-kurudere-messages-default-rtdb.europe-west1.firebasedatabase.app";
        const relayNames = new Array(8).fill("");

        function setStatus(message, isError = false) {
            const box = document.getElementById("status");
            box.textContent = message;
            box.className = isError ? "status error" : "status ok";
        }

        function renderRelayButtons() {
            const grid = document.getElementById("relay-grid");
            grid.innerHTML = "";

            for (let i = 0; i < 8; i++) {
                const relayNo = i + 1;
                const relayLabel = relayNames[i] && relayNames[i].trim() !== "" ? relayNames[i] : `Relay ${relayNo}`;

                const row = document.createElement("div");
                row.className = "relay-row";

                const name = document.createElement("div");
                name.className = "relay-name";
                name.textContent = relayLabel;

                const onBtn = document.createElement("button");
                onBtn.className = "btn-on";
                onBtn.textContent = "ON";
                onBtn.addEventListener("click", () => writeCommand(relayNo + 10, `${relayLabel} ON`));

                const offBtn = document.createElement("button");
                offBtn.className = "btn-off";
                offBtn.textContent = "OFF";
                offBtn.addEventListener("click", () => writeCommand(relayNo + 20, `${relayLabel} OFF`));

                row.appendChild(name);
                row.appendChild(onBtn);
                row.appendChild(offBtn);
                grid.appendChild(row);
            }
        }

        function writeCommand(commandValue, actionLabel) {
            fetch(`${firebaseUrl}/Params/Command.json`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(commandValue)
            })
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    setStatus(`Komut yazıldı: ${actionLabel} (Params/Command=${commandValue})`);
                })
                .catch(error => {
                    console.error("Failed to write command:", error);
                    setStatus(`Komut yazılamadı: ${actionLabel}`, true);
                });
        }

        function fetchRelayNamesAndRender() {
            const requests = [];
            for (let i = 0; i < 8; i++) {
                const req = fetch(`${firebaseUrl}/relays/relay${i}.json`)
                    .then(response => response.ok ? response.json() : null)
                    .then(name => {
                        if (name && typeof name === "string" && name.trim() !== "") {
                            relayNames[i] = name;
                        } else {
                            relayNames[i] = `Relay ${i + 1}`;
                        }
                    })
                    .catch(() => {
                        relayNames[i] = `Relay ${i + 1}`;
                    });
                requests.push(req);
            }

            Promise.all(requests).then(() => renderRelayButtons());
        }

        fetchRelayNamesAndRender();
    </script>
</body>
</html>
